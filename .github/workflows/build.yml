name: Build Application

on:
  release:
    types: [published]  # Only trigger on published releases
  workflow_dispatch:  # Allow manual triggering

# Add global permissions
permissions:
  contents: write
  
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install ".[gui]"
    - name: Build with PyInstaller
      run: |
        pyinstaller --windowed --icon=gui/logo_pynutil.ico --name pynutil gui/pynutil_gui.py
        
    - name: Create Windows ZIP archive
      run: |
        cd dist
        powershell Compress-Archive -Path pynutil -DestinationPath pynutil-Windows.zip
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: pynutil-Windows
        path: dist/pynutil-Windows.zip
        retention-days: 5

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install dmgbuild
        pip install ".[gui]"
    - name: Build with PyInstaller
      run: |
        # Build without specifying an icon for macOS to avoid format issues
        pyinstaller --windowed --osx-bundle-identifier com.pynutil.app --name pynutil gui/pynutil_gui.py
        
    - name: Create DMG
      run: |
        pip install dmgbuild
        cat > dmg_settings.py << EOF
        app = 'dist/pynutil.app'
        appname = 'pynutil'
        format = 'UDBZ'
        size = '500M'
        files = [app]
        symlinks = {'Applications': '/Applications'}
        # Remove badge_icon to avoid icon format issues
        icon_locations = {
            appname + '.app': (140, 120),
            'Applications': (360, 120)
        }
        background = 'builtin-arrow'
        EOF
        dmgbuild -s dmg_settings.py "pynutil" "dist/pynutil-macOS.dmg" || true
        
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: pynutil-macOS
        path: dist/pynutil-macOS.dmg
        retention-days: 5

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: List downloaded artifacts
        run: |
          find . -type f | sort
        
      - name: Attach Artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pynutil-Windows/pynutil-Windows.zip
            pynutil-macOS/pynutil-macOS.dmg
          token: ${{ github.token }}
